<!DOCTYPE html>
<html>

<head>
    <title>{{page_title}} v{{version}}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icon.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon.png') }}">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css"> <!-- Bulma css-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- Font Awesome icons-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body class="has-background-black has-text-light" style="min-height: 100vh;">
    <nav class="navbar is-primary">
        <div class="navbar-brand">
            <a class="navbar-item" href="{{url_for('load')}}" onclick="event.preventDefault(); switchTab('home');">
                <img src="{{ url_for('static', filename='icon.png') }}" width="28" height="28">
            </a>
            <div class="navbar-item">
                <p class="has-text-white has-text-weight-bold">Katana v{{version}}</p>
            </div>
            <div class="navbar-item">
                <p class="has-text-white">Current Project: {{ project_name or 'None' }}</p>
            </div>

        </div>



    </nav>
    {% block content %}
    {% endblock %}
</body>

</html>
